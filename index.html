  if (v >= 1000000) return '$'+(v/1000000).toFixed(1)+'M';
  if (v >= 1000)    return '$'+(v/1000).toFixed(0)+'K';
  return '$'+v.toFixed(0);
}
function fmtFull(v) {
  if (!v) return '—';
  return '$'+v.toLocaleString('es-MX', {maximumFractionDigits:0});
}
function daysSince(str) {
  return Math.round((new Date(SNAPSHOT_DATE) - new Date(str)) / 86400000);
}
function avgAge(arr) {
  const valid = arr.filter(d => d.created);
  if (!valid.length) return 0;
  return Math.round(valid.reduce((s,d) => s + daysSince(d.created), 0) / valid.length);
}

function render() {
  const pipeDeals = DEALS.filter(d => PIPE_STAGES.includes(d.stage));
  const wonDeals  = DEALS.filter(d => d.stage === '5. Won 🎉');
  const lostDeals = DEALS.filter(d => d.stage === '6. Lost');

  const totalVal  = DEALS.reduce((s,d) => s+d.val, 0);
  const pipeVal   = pipeDeals.reduce((s,d) => s+d.val, 0);
  const wonVal    = wonDeals.reduce((s,d) => s+d.val, 0);
  const lostVal   = lostDeals.reduce((s,d) => s+d.val, 0);
  const convRate  = DEALS.length > 0 ? wonDeals.length / DEALS.length * 100 : 0;
  const avgTicket = wonDeals.length > 0 ? wonVal / wonDeals.length : 0;

  // By stage
  const byStage = {};
  DEALS.forEach(d => {
    if (!byStage[d.stage]) byStage[d.stage] = {count:0, value:0, deals:[]};
    byStage[d.stage].count++;
    byStage[d.stage].value += d.val;
    byStage[d.stage].deals.push(d);
  });
  const maxFunnelVal = Math.max(1, ...FUNNEL_STAGES.map(s => byStage[s]?.value || 0));

  // By BU
  const byBU = {};
  DEALS.forEach(d => {
    if (!byBU[d.bu]) byBU[d.bu] = {count:0, value:0, pipeDeals:[]};
    byBU[d.bu].count++;
    byBU[d.bu].value += d.val;
    if (PIPE_STAGES.includes(d.stage)) byBU[d.bu].pipeDeals.push(d);
  });
  const buList   = Object.entries(byBU).sort((a,b) => b[1].value - a[1].value);
  const maxBUVal = Math.max(1, ...buList.map(([,v]) => v.value));

  // Top 10 pipeline by value
  const top10 = [...pipeDeals].sort((a,b) => b.val - a.val).slice(0, 10);

  // BU notes
  const buNotes = buList.map(([bu, d]) => {
    const sf = {};
    d.pipeDeals.forEach(x => { sf[x.stage] = (sf[x.stage]||0)+1; });
    const top = Object.entries(sf).sort((a,b)=>b[1]-a[1])[0];
    const note = top
      ? `mayor concentración en ${top[0].replace(/^\d\.\s*/,'')} (${top[1]})`
      : 'sin deals en pipeline activo';
    return { bu, note, color: BU_COLOR[bu]||'#aaa' };
  });

  // Hallazgos
  const hz = [];
  const leadCount = byStage['1. Lead']?.count || 0;
  if (leadCount <= 1)
    hz.push({icon:'!', color:'#ef4444', title:'Generación de demanda en alerta',
      text:`Solo ${leadCount||'ningún'} lead nuevo en pipe. El embudo está concentrado en etapas medias-altas. Reforzar prospección y marketing de captación.`});

  hz.push({icon:'✓', color:'#22c55e', title:`Conversion rate ${convRate>=35?'saludable':'por mejorar'}`,
    text:`${convRate.toFixed(1)}% de los deals trabajados se convierten en venta. ${convRate>=35?'Indica buena calidad en calificación y proceso comercial.':'Revisar el proceso de calificación y seguimiento.'}`});

  const ipCount = byStage['3. In Progress']?.count||0;
  const ipVal   = byStage['3. In Progress']?.value||0;
  if (ipCount >= 3)
    hz.push({icon:'→', color:'#f59e0b', title:'Cuello de botella en "In Progress"',
      text:`${ipCount} deals (${fmtShort(ipVal)}) concentrados en In Progress. Es la etapa con mayor acumulación — revisar bloqueos y acelerar avance a Due Diligence.`});

  const noVal = pipeDeals.filter(d => d.val === 0).length;
  if (noVal > 0)
    hz.push({icon:'!', color:'#888', title:'Higiene de datos',
      text:`${noVal} deal${noVal>1?'s':''} activo${noVal>1?'s':''} sin valor asignado. Completar los montos para mejorar el accuracy del forecast.`});

  // Date display
  const d    = new Date(SNAPSHOT_DATE);
  const dEnd = d;
  const dStart = new Date(WEEK_START);
  const fmtDay = (dt) => dt.toLocaleDateString('es-MX',{day:'numeric',month:'short'}).toUpperCase();
  const weekRange = `${fmtDay(dStart)} – ${fmtDay(dEnd)} ${dEnd.getFullYear()}`;
  const qtr = 'Q'+Math.ceil((d.getMonth()+1)/3)+' '+d.getFullYear();
  const dateStr = d.toLocaleDateString('es-MX',{day:'2-digit',month:'short',year:'numeric'}).toUpperCase();

  // Week-over-week
  const newThisWeek = DEALS.filter(x => new Date(x.created) >= dStart);
  const wonThisWeek = wonDeals.filter(x => new Date(x.created) >= dStart);
  const lostThisWeek = lostDeals.filter(x => new Date(x.created) >= dStart);

  function dlt(cur, prev) {
    if (PREV_WEEK === null || prev == null) return null;
    return cur - prev;
  }
  function renderD(diff, fmtFn) {
    if (diff === null) return `<span class="wow-delta na">Primer reporte</span>`;
    if (diff === 0)    return `<span class="wow-delta neu">→ Sin cambio</span>`;
    const cls = diff > 0 ? 'pos' : 'neg';
    const arrow = diff > 0 ? '↑' : '↓';
    return `<span class="wow-delta ${cls}">${arrow} ${fmtFn(Math.abs(diff))}</span>`;
  }

  const dPipe    = dlt(pipeVal,   PREV_WEEK?.pipeVal);
  const dWon     = dlt(wonDeals.length, PREV_WEEK?.wonCount);
  const dLost    = dlt(lostDeals.length, PREV_WEEK?.lostCount);
  const dIP      = dlt(byStage['3. In Progress']?.count||0, PREV_WEEK?.byStageCount?.['3. In Progress']);
  const dDD      = dlt(byStage['4. Due Diligence']?.count||0, PREV_WEEK?.byStageCount?.['4. Due Diligence']);

  document.getElementById('root').innerHTML = `
    <div class="hdr">
      <div>
        <div class="logo">dinkbit</div>
        <div class="hdr-sub">Pipeline de Ventas · Snapshot Semanal</div>
      </div>
      <div class="hdr-right">
        <div class="hdr-period">${weekRange}</div>
        <div class="hdr-date">${qtr} · Generado el ${dateStr}</div>
      </div>
    </div>

    <div class="alert">
      <strong>Alcance del análisis:</strong> Se excluyen los deals con estatus <em>"On Hold"</em> para enfocar el reporte en el pipe activo y en cierres del periodo.
    </div>

    <div class="kpis">
      <div class="kpi">
        <div class="kpi-label">Pipe Total</div>
        <div class="kpi-val">MXN${fmtBig(totalVal)}</div>
        <div class="kpi-note">${DEALS.length} oportunidades</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">Pipe Activo</div>
        <div class="kpi-val">MXN${fmtBig(pipeVal)}</div>
        <div class="kpi-note">${pipeDeals.length} deals en negociación</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">Won YTD</div>
        <div class="kpi-val">MXN${fmtBig(wonVal)}</div>
        <div class="kpi-note">${wonDeals.length} deals cerrados</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">Conversion Rate</div>
        <div class="kpi-val">${convRate.toFixed(1)}%</div>
        <div class="kpi-note">${wonDeals.length} won / ${DEALS.length} totales</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">Ticket Promedio</div>
        <div class="kpi-val">MXN${fmtBig(avgTicket)}</div>
        <div class="kpi-note">deals cerrados (Won)</div>
      </div>
    </div>

    <div class="wow">
      <div class="wow-item">
        <div class="wow-label">Nuevos esta semana</div>
        <div class="wow-val">${newThisWeek.length}</div>
        <div class="wow-sub" style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${newThisWeek.length > 0 ? newThisWeek.map(x=>x.company||x.name).join(', ') : 'Ninguno'}</div>
      </div>
      <div class="wow-item">
        <div class="wow-label">Δ Pipe Activo</div>
        <div class="wow-val">${PREV_WEEK ? 'MXN'+fmtBig(Math.abs(dPipe)) : '—'}</div>
        <div class="wow-sub">${renderD(dPipe, v => 'MXN'+fmtBig(v))}${PREV_WEEK===null ? '<span class="wow-first"> Primer reporte</span>' : ''}</div>
      </div>
      <div class="wow-item">
        <div class="wow-label">Δ In Progress</div>
        <div class="wow-val">${byStage['3. In Progress']?.count||0}</div>
        <div class="wow-sub">${renderD(dIP, v => v+' deals')}</div>
      </div>
      <div class="wow-item">
        <div class="wow-label">Δ Due Diligence</div>
        <div class="wow-val">${byStage['4. Due Diligence']?.count||0}</div>
        <div class="wow-sub">${renderD(dDD, v => v+' deals')}</div>
      </div>
      <div class="wow-item">
        <div class="wow-label">Won / Lost esta semana</div>
        <div class="wow-val"><span style="color:#15803d">${wonThisWeek.length}</span> <span style="color:#ddd;font-weight:400">/</span> <span style="color:#b91c1c">${lostThisWeek.length}</span></div>
        <div class="wow-sub">${wonThisWeek.length+lostThisWeek.length > 0 ? fmtShort(wonThisWeek.reduce((s,x)=>s+x.val,0)) + ' ganado' : PREV_WEEK===null ? '<span class="wow-first">Primer reporte</span>' : 'Sin cierres'}</div>
      </div>
    </div>

    <div class="main">

      <div class="main-left">
        <div class="card">
          <div class="card-hdr">
            <div class="card-title"><em>Embudo</em> de conversión</div>
            <div class="card-meta">${DEALS.length} DEALS · ${fmtShort(totalVal)}</div>
          </div>
          ${FUNNEL_STAGES.map(s => {
            const sd = byStage[s]||{count:0,value:0};
            const pct = sd.value>0 ? Math.max(2,(sd.value/maxFunnelVal)*100) : (sd.count>0?3:1);
            return `<div class="f-row">
              <div class="f-label">${s}</div>
              <div class="f-wrap"><div class="f-bar" style="width:${pct}%;background:${STAGE_BAR[s]||'#ccc'}"></div></div>
              <div class="f-cnt">${sd.count}</div>
              <div class="f-val">${sd.value>0 ? fmtShort(sd.value) : '—'}</div>
            </div>`;
          }).join('')}
        </div>

        <div class="card">
          <div class="card-hdr">
            <div class="card-title"><em>Unidades</em> de negocio</div>
            <div class="card-meta">Por valor de pipe</div>
          </div>
          ${buList.map(([bu, d]) => {
            const pct = totalVal>0 ? Math.round(d.value/totalVal*100) : 0;
            const col = BU_COLOR[bu]||'#aaa';
            return `<div class="bu">
              <div class="bu-header">
                <div class="bu-name">${bu}</div>
                <div class="bu-val" style="color:${col}">${fmtShort(d.value)}</div>
              </div>
              <div class="bu-wrap"><div class="bu-fill" style="width:${Math.max(2,(d.value/maxBUVal)*100)}%;background:${col}"></div></div>
              <div class="bu-sub">${d.count} DEAL${d.count!==1?'S':''} · ${pct}% DEL PIPE</div>
            </div>`;
          }).join('')}
          <div class="bu-dist">
            <div class="bu-dist-lbl">Distribución por etapa</div>
            ${buNotes.map(({bu,note,color}) => `
              <div class="bu-note" style="border-left-color:${color}">
                <strong>${bu.split(' ')[0]}:</strong> ${note}
              </div>
            `).join('')}
          </div>
        </div>
      </div>

      <div class="main-center">
        <div class="card">
          <div class="card-hdr">
            <div class="card-title"><em>Top 10 oportunidades</em> activas</div>
            <div class="card-meta">Prioridad de cierre · ${pipeDeals.length} en pipe</div>
          </div>
          <table>
            <colgroup>
              <col style="width:18px">
              <col style="width:auto">
              <col style="width:44px">
              <col style="width:40px">
              <col style="width:62px">
            </colgroup>
            <thead>
              <tr>
                <th>#</th><th>Deal / Empresa</th><th>Etapa</th><th>BU</th><th style="text-align:right">Valor MXN</th>
              </tr>
            </thead>
            <tbody>
              ${top10.map((d,i) => {
                const sc = STAGE_PILL[d.stage]||{bg:'#f0f0f0',text:'#555'};
                const bc = BU_COLOR[d.bu]||'#aaa';
                return `<tr>
                  <td class="rn">${i+1}</td>
                  <td style="max-width:0">
                    <div class="deal-name">${d.name}</div>
                    ${d.company ? `<div class="deal-co">${d.company}</div>` : ''}
                  </td>
                  <td><span class="pill" style="background:${sc.bg};color:${sc.text}">${{'2. Proposal':'Prop','3. In Progress':'IP','4. Due Diligence':'DD','5. Won 🎉':'Won','6. Lost':'Lost'}[d.stage]||d.stage}</span></td>
                  <td><span class="pill" style="background:${bc}18;color:${bc}">${{'Web & App Development':'Web','Marketing':'Mktg','Design':'Design'}[d.bu]||d.bu.split(' ')[0]}</span></td>
                  <td class="val-r">${fmtFull(d.val)}</td>
                </tr>`;
              }).join('')}
            </tbody>
          </table>
        </div>
      </div>

      <div class="main-right">
        <div class="card">
          <div class="card-hdr">
            <div class="card-title"><em>Cierres</em> YTD</div>
            <div class="card-meta">Won vs Lost</div>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:7px">
            <div class="ytd-won">
              <div class="ytd-lbl">WON 🎉</div>
              <div class="ytd-v" style="color:#15803d">${fmtShort(wonVal)}</div>
              <div class="ytd-s">${wonDeals.length} deals · prom ${fmtShort(wonDeals.length>0?wonVal/wonDeals.length:0)}</div>
            </div>
            <div class="ytd-lost">
              <div class="ytd-lbl">LOST</div>
              <div class="ytd-v" style="color:#b91c1c">${fmtShort(lostVal)}</div>
              <div class="ytd-s">${lostDeals.length} deals · prom ${fmtShort(lostDeals.length>0?lostVal/lostDeals.length:0)}</div>
            </div>
          </div>
          <div style="display:flex;align-items:baseline;gap:14px">
            <div>
              <div class="conv-big" style="text-align:left;margin-top:0">${convRate.toFixed(1)}%</div>
              <div class="conv-lbl" style="text-align:left">Conv. Rate · Won / Total</div>
            </div>
            <div class="coverage" style="margin-top:0;padding-top:0;border-top:none">
              <span class="coverage-val">${pipeVal > 0 && wonVal > 0 ? (pipeVal/wonVal).toFixed(1)+'x' : '—'}</span>
              <span class="coverage-lbl">Coverage</span>
            </div>
          </div>
          <div class="won-bu">
            <div class="won-bu-lbl">Won por unidad</div>
            ${Object.entries(wonDeals.reduce((acc,d)=>{if(!acc[d.bu])acc[d.bu]={val:0,count:0};acc[d.bu].val+=d.val;acc[d.bu].count++;return acc;},{}))
              .sort((a,b)=>b[1].val-a[1].val).map(([bu,bud])=>`
              <div class="won-bu-row">
                <span class="won-bu-dot" style="background:${BU_COLOR[bu]||'#aaa'}"></span>
                <span class="won-bu-name">${bu}</span>
                <span class="won-bu-val">${fmtShort(bud.val)}</span>
                <span class="won-bu-cnt">${bud.count} deals</span>
              </div>`).join('')}
          </div>
        </div>

        <div class="card">
          <div class="card-hdr">
            <div class="card-title"><em>Hallazgos</em> & acciones</div>
            <div class="card-meta">Prioridades</div>
          </div>
          ${hz.map(h => `
            <div class="hz" style="border-left-color:${h.color}">
              <div class="hz-icon" style="color:${h.color}">${h.icon}</div>
              <div class="hz-title">${h.title}</div>
              <div class="hz-text">${h.text}</div>
            </div>
          `).join('')}
        </div>
      </div>

    </div>

    <div class="footer">
      <div>dinkbit · Pipeline Analytics · ${qtr}</div>
      <div class="legend">
        ${Object.entries(BU_COLOR).map(([bu,c]) => `
          <span><span class="leg-dot" style="background:${c}"></span>${bu.split(' ')[0].toUpperCase()}</span>
        `).join('')}
      </div>
      <div>Fuente · Attio CRM · ${dateStr}</div>
    </div>
  `;
}

render();
</script>
</body>
</html>
