function fmtBig(v){if(v>=1000000)return(v/1000000).toFixed(2)+"M";if(v>=1000)return(v/1000).toFixed(0)+"K";return v.toFixed(0);}

function fmtFull(v){if(!v)return"—";return"$"+v.toLocaleString("es-MX",{maximumFractionDigits:0});}

function el(tag,attrs,children){
  const e=document.createElement(tag);
  if(attrs)Object.entries(attrs).forEach(([k,v])=>{if(k==="style")e.style.cssText=v;else if(k.startsWith("on"))e.addEventListener(k.slice(2),v);else e.setAttribute(k,v);});
  (children||[]).forEach(c=>{if(c==null)return;e.appendChild(typeof c==="string"?document.createTextNode(c):c);});
  return e;
}
function div(style,children){return el("div",{style},children);}

function compute(){
  const pipeDeals=DEALS.filter(d=>PIPE_STAGES.includes(d.stage));
  const wonDeals=DEALS.filter(d=>d.stage==="5. Won 🎉");
  const lostDeals=DEALS.filter(d=>d.stage==="6. Lost");
  const totalVal=DEALS.reduce((s,d)=>s+d.val,0);
  const pipeVal=pipeDeals.reduce((s,d)=>s+d.val,0);
  const wonVal=wonDeals.reduce((s,d)=>s+d.val,0);
  const convRate=DEALS.length>0?wonDeals.length/DEALS.length*100:0;
  const avgTicket=wonDeals.length>0?wonVal/wonDeals.length:0;
  const byStage={};
  DEALS.forEach(d=>{if(!byStage[d.stage])byStage[d.stage]={count:0,value:0,deals:[]};byStage[d.stage].count++;byStage[d.stage].value+=d.val;byStage[d.stage].deals.push(d);});
  const byBU={};
  DEALS.forEach(d=>{if(!byBU[d.bu])byBU[d.bu]={count:0,value:0};byBU[d.bu].count++;byBU[d.bu].value+=d.val;});
  const buListRaw=Object.entries(byBU).sort((a,b)=>b[1].value-a[1].value);
  const dDate=new Date(SNAPSHOT_DATE),dStart=new Date(WEEK_START);
  const fmtDay=dt=>dt.toLocaleDateString("es-MX",{day:"numeric",month:"short"}).toUpperCase();
  const weekRange=`${fmtDay(dStart)} – ${fmtDay(dDate)} ${dDate.getFullYear()}`;
  const qtr="Q"+Math.ceil((dDate.getMonth()+1)/3)+" "+dDate.getFullYear();
  const dateStr=dDate.toLocaleDateString("es-MX",{day:"2-digit",month:"short",year:"numeric"}).toUpperCase();
  const chartCounts=FUNNEL_STAGES.map(s=>byStage[s]?.count||0);
  const maxChartCount=Math.max(1,...chartCounts);
  const chartPct=chartCounts.map(c=>Math.max(14,Math.round(c/maxChartCount*100)));
  const funnelData=FUNNEL_STAGES.map((s,i)=>{
    const leftH=i===0?chartPct[0]:chartPct[i-1];
    const rightH=chartPct[i];
    const topL=(100-leftH)/2,botL=100-topL,topR=(100-rightH)/2,botR=100-topR;
    const clip=`polygon(0% ${topL}%, 100% ${topR}%, 100% ${botR}%, 0% ${botL}%)`;
    const sd=byStage[s]||{count:0,value:0,deals:[]};
    return{s,topLabel:sd.value>0?fmtShort(sd.value):"—",countLabel:sd.count+(sd.count===1?" deal":" deals"),bottomLabel:CHART_NAME[s],color:STAGE_BAR[s],clip,isNotLast:i!==FUNNEL_STAGES.length-1,deals:sd.deals};
  });
  const dropoffs=[];
  for(let i=0;i<FUNNEL_STAGES.length-1;i++){
    const cur=chartCounts[i],nxt=chartCounts[i+1];
    const pct=cur>0?Math.round(nxt/cur*100):0;
    dropoffs.push({show:cur>0,text:cur>0?`${pct}% →`:"",color:pct>=50?"oklch(46% 0.14 145)":"oklch(46% 0.14 55)"});
  }
  dropoffs.push({show:false,text:"",color:"#999"});
  const top10Raw=[...pipeDeals].filter(d=>d.val>0).sort((a,b)=>b.val-a.val).slice(0,10);
  const top10=top10Raw.map((d,i)=>{
    const sc=STAGE_PILL[d.stage]||{bg:"#f0f0f0",text:"#555"};
    return{rank:i+1,name:d.name,company:d.company||"",hasCompany:!!d.company,stageLbl:STAGE_LBL[d.stage]||d.stage,stagePillBg:sc.bg,stagePillText:sc.text,buLbl:BU_LBL[d.bu]||d.bu.split(" ")[0],buPillBg:BU_BG[d.bu]||"#f0f0f0",buPillText:BU_COLOR[d.bu]||"#aaa",val:fmtFull(d.val)};
  });
  const bySrc={};
  DEALS.forEach(d=>{const s=d.src||"Sin fuente";if(!bySrc[s])bySrc[s]={count:0,value:0,won:0};bySrc[s].count++;bySrc[s].value+=d.val;if(d.stage==="5. Won 🎉")bySrc[s].won++;});
  const srcListRaw=Object.entries(bySrc).sort((a,b)=>b[1].count-a[1].count);
  const maxSrcCount=Math.max(1,...srcListRaw.map(([,v])=>v.count));
  const sourceRows=srcListRaw.map(([src,d])=>({name:src,count:d.count,pct:Math.max(3,(d.count/maxSrcCount)*100)}));
  const buTotalVal=buListRaw.reduce((s,[,d])=>s+d.value,0);
  let cursor=0;
  const buPieSlices=buListRaw.map(([bu,d])=>{
    const share=buTotalVal>0?d.value/buTotalVal*100:0;
    const start=cursor;cursor+=share;
    return{color:BU_COLOR[bu]||"#aaa",start,end:cursor};
  });
  const buPieGradient=buTotalVal>0?"conic-gradient("+buPieSlices.map(s=>`${s.color} ${s.start}% ${s.end}%`).join(", ")+")":"conic-gradient(#eceef1 0% 100%)";
  const buLegend=buListRaw.map(([bu,d])=>({name:bu,pct:totalVal>0?Math.round(d.value/totalVal*100)+"%":"0%",color:BU_COLOR[bu]||"#aaa",value:fmtShort(d.value),count:d.count+(d.count===1?" deal":" deals")}));
  const ddCount=byStage["4. Due Diligence"]?.count||0,ddVal=byStage["4. Due Diligence"]?.value||0;
  const noVal=pipeDeals.filter(d=>d.val===0).length;
  const headline=ddCount>=3?`El pipeline avanza: ${ddCount} deals por ${fmtShort(ddVal)} alcanzaron Due Diligence.`:(convRate>=35?`La conversión se mantiene sólida en ${convRate.toFixed(1)}%.`:`El pipe crece, pero la conversión pide atención.`);
  const ledeText=`De ${DEALS.length} deals registrados, ${pipeDeals.length} siguen activos por ${fmtShort(pipeVal)}. Vs. el 3 de julio: B Hermanos cerrado (+$117K), 2 pérdidas (Fase Zero, REAC) y 5 nuevas entradas a Proposal. Se excluyen los deals en "On Hold".`;
  const hallazgos=[];
  hallazgos.push({title:"Cierre de la semana: Distribuidoras | B Hermanos",text:"Grupo Batta pasa a Won por $117K — primer cierre desde el 3 de julio. La estrategia de eCommerce ($273K) sigue activa en IP. Momentum comprobado con el cliente."});
  if(ddCount>=3)hallazgos.push({title:`${ddCount} deals en Due Diligence — $${fmtShort(ddVal).slice(1)} en la recta final`,text:`BASHAM, MTA Trust, CMF, QM+3, DiferenciArte y Healthical están a un paso del cierre. Prioridad: seguimiento intensivo antes del 18 de julio.`});
  hallazgos.push({title:"Proposal se duplicó: 10 vs 5 del 3 de julio",text:`3 Kometia leads progresaron + 2 nuevas oportunidades (Amesa y Bolsas Jennyfer). Calificar y valorizar los deals sin monto para tener forecast más preciso.`});
  hallazgos.push({title:"2 pérdidas esta semana: Fase Zero y REAC ($122K)",text:"Fase Zero salió tras 4 semanas sin avance. REAC ($122K) también se marcó como perdido. Documentar objeción para detectar patrón en Kometia referrals."});
  if(noVal>0)hallazgos.push({title:`Higiene: ${noVal} deals sin valor asignado`,text:`${noVal} oportunidades activas sin monto estimado. Afecta el accuracy del forecast. Meta: completar antes del próximo snapshot.`});
  const heroInsight=hallazgos.find(h=>h.title.includes("Due Diligence"))||hallazgos[0];
  const restInsights=hallazgos.filter(h=>h!==heroInsight);
  return{weekRange,qtr,dateStr,headline,ledeText,kpiPipeTotalVal:"MXN"+fmtBig(totalVal),dealCountLbl:DEALS.length+" deals",wonDealsCountLbl:wonDeals.length,wonValShort:fmtShort(wonVal),avgTicketLbl:"ticket prom. "+fmtShort(avgTicket),convRateStr:convRate.toFixed(1)+"%",totalValShort:fmtShort(totalVal),funnelData,dropoffs,top10,heroInsight,restInsights,pipeCountLbl:pipeDeals.length,buPieGradient,buLegend,sourceRows};
}

  const funnelHeader=div("display:flex;align-items:baseline;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:8px;",[
    div("font-size:24px;font-weight:800;letter-spacing:-0.3px;",[document.createTextNode("El embudo, paso a paso")]),
    div("font-size:12.5px;color:#9ca3af;font-weight:700;background:oklch(95% 0.012 264);border-radius:99px;padding:6px 14px;",[document.createTextNode(C.totalValShort+" en juego")]),
  ]);
  funnelSec.appendChild(funnelHeader);
  funnelSec.appendChild(div("font-size:14.5px;color:#8a8f98;max-width:600px;margin-bottom:28px;line-height:1.55;",[document.createTextNode("Cada bloque es el valor de los deals en esa etapa. El ancho de la conexión muestra qué tanto pipe sobrevive al siguiente paso.")]));

    bar.style.clipPath=c.clip;col.appendChild(bar);
    if(c.isNotLast)col.appendChild(div("position:absolute;top:0;bottom:0;right:0;width:3px;background:#fff;",[]));
    col.appendChild(div("position:absolute;left:0;right:0;top:50%;transform:translateY(-50%);text-align:center;",[
      div("font-size:11px;font-weight:700;color:#0b0b0c;background:rgba(255,255,255,0.85);border-radius:99px;padding:3px 10px;display:inline-block;",[document.createTextNode(c.countLabel)]),

  hallazgosSec.appendChild(div("background:oklch(95% 0.04 264);border-radius:20px;padding:26px 28px;",[
    div("font-size:26px;line-height:1.32;font-weight:800;letter-spacing:-0.4px;color:#0b0b0c;",[document.createTextNode(C.heroInsight.title)]),
    div("font-size:15px;color:#4b5563;line-height:1.65;margin-top:14px;max-width:480px;",[document.createTextNode(C.heroInsight.text)]),

  prioSec.appendChild(div("display:flex;align-items:baseline;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:20px;",[
    div("font-size:24px;font-weight:800;letter-spacing:-0.3px;",[document.createTextNode("Diez deals que definen la semana")]),
    div("font-size:12.5px;color:#9ca3af;font-weight:700;background:oklch(95% 0.012 264);border-radius:99px;padding:6px 14px;",[document.createTextNode(C.pipeCountLbl+" en pipe activo")]),
  ]));
  const tbl=el("table",{style:"width:100%;border-collapse:separate;border-spacing:0 6px;table-layout:fixed;"},[]);
  tbl.appendChild(el("colgroup",{},[el("col",{style:"width:32px"},[]),el("col",{style:"width:auto"},[]),el("col",{style:"width:90px"},[]),el("col",{style:"width:80px"},[]),el("col",{style:"width:130px"},[]),]));
  const thS2="font-size:11px;font-weight:800;letter-spacing:0.6px;text-transform:uppercase;color:#9ca3af;text-align:left;padding:8px 10px;";
  tbl.appendChild(el("thead",{},[el("tr",{},[el("th",{style:thS2},[document.createTextNode("#")]),el("th",{style:thS2},[document.createTextNode("Deal / Empresa")]),el("th",{style:thS2},[document.createTextNode("Etapa")]),el("th",{style:thS2},[document.createTextNode("BU")]),el("th",{style:thS2+"text-align:right;"},[document.createTextNode("Valor MXN")])])]));
  const tb2=el("tbody",{},[]);
  C.top10.forEach(t=>{
    tb2.appendChild(el("tr",{},[
      el("td",{style:"padding:14px 10px;background:oklch(96% 0.012 264);color:#b0b5bd;font-size:12px;font-weight:700;border-radius:12px 0 0 12px;"},[document.createTextNode(String(t.rank))]),
      el("td",{style:"padding:14px 10px;background:oklch(96% 0.012 264);max-width:0;"},[
        div("font-weight:700;font-size:14.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;",[document.createTextNode(t.name)]),
        t.hasCompany?div("font-size:12.5px;color:#aaa;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px;",[document.createTextNode(t.company)]):null,
      ].filter(Boolean)),
      el("td",{style:"padding:14px 10px;background:oklch(96% 0.012 264);"}, [span(`display:inline-block;border-radius:99px;padding:3px 10px;font-size:11px;font-weight:800;text-transform:uppercase;white-space:nowrap;background:${t.stagePillBg};color:${t.stagePillText};`,[document.createTextNode(t.stageLbl)])]),
      el("td",{style:"padding:14px 10px;background:oklch(96% 0.012 264);"}, [span(`display:inline-block;border-radius:99px;padding:3px 10px;font-size:11px;font-weight:800;text-transform:uppercase;white-space:nowrap;background:${t.buPillBg};color:${t.buPillText};`,[document.createTextNode(t.buLbl)])]),
      el("td",{style:"padding:14px 10px;background:oklch(96% 0.012 264);text-align:right;font-weight:800;font-variant-numeric:tabular-nums;font-size:14.5px;border-radius:0 12px 12px 0;"},[document.createTextNode(t.val)]),
    ]));
  });
  tbl.appendChild(tb2);prioSec.appendChild(tbl);inner.appendChild(prioSec);

  // APPENDIX
  const appSec=div("","");
  appSec.id="apendice";
  appSec.style.cssText="margin-top:24px;background:#fff;border:1px solid #e2e4e8;border-radius:28px;padding:36px 40px;box-shadow:0 1px 2px rgba(20,20,30,0.04);";
  appSec.appendChild(div("font-size:11px;font-weight:700;letter-spacing:1.4px;text-transform:uppercase;color:#9ca3af;margin-bottom:28px;",[document.createTextNode("Apéndice")]));
  const appGrid=div("display:grid;grid-template-columns:1fr 1fr;gap:24px;",[]);

  // BU pie
  const pie=div("position:absolute;inset:0;border-radius:50%;",[]);
  pie.style.background=C.buPieGradient;
  appGrid.appendChild(div("background:oklch(96% 0.012 264);border-radius:20px;padding:24px 26px;",[
    div("font-size:13px;font-weight:800;color:#0b0b0c;margin-bottom:18px;",[document.createTextNode("Unidades de negocio")]),
    div("display:flex;align-items:center;gap:28px;",[
      div("position:relative;width:126px;height:126px;flex-shrink:0;",[
        pie,
        div("position:absolute;inset:19px;border-radius:50%;background:oklch(96% 0.012 264);display:flex;flex-direction:column;align-items:center;justify-content:center;",[
          div("font-size:16px;font-weight:800;letter-spacing:-0.3px;color:#0b0b0c;",[document.createTextNode(C.totalValShort)]),
          div("font-size:9.5px;font-weight:700;color:#9ca3af;text-transform:uppercase;letter-spacing:0.3px;margin-top:2px;",[document.createTextNode(C.dealCountLbl)]),
        ]),
      ]),
      div("flex:1;display:flex;flex-direction:column;gap:13px;",C.buLegend.map(b=>div("display:grid;grid-template-columns:12px 1fr auto auto;column-gap:8px;align-items:start;",[
        span("width:8px;height:8px;border-radius:50%;flex-shrink:0;background:"+b.color+";margin-top:4px;",[]),
        el("span",{},[span("font-size:13px;font-weight:700;color:#161616;display:block;line-height:1.3;",[document.createTextNode(b.name)]),span("font-size:11px;color:#9ca3af;",[document.createTextNode(b.count)])]),
        span("font-size:13px;font-weight:800;color:#161616;white-space:nowrap;justify-self:end;",[document.createTextNode(b.value)]),
        span("font-size:11.5px;font-weight:700;color:#9ca3af;width:30px;text-align:right;",[document.createTextNode(b.pct)]),
      ]))),
    ]),

  // Sources
  appGrid.appendChild(div("background:oklch(96% 0.012 264);border-radius:20px;padding:24px 26px;",[
    div("font-size:13px;font-weight:800;color:#0b0b0c;margin-bottom:18px;",[document.createTextNode("Fuentes de deals")]),

      div("width:100px;flex-shrink:0;font-size:12.5px;font-weight:700;color:#0b0b0c;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;",[document.createTextNode(s.name)]),
      (()=>{const b=div("flex:1;background:#e9eaed;border-radius:99px;height:10px;overflow:hidden;",[]);const f=div("height:10px;border-radius:99px;background:#254EF4;",[]);f.style.width=s.pct+"%";b.appendChild(f);return b;})(),

render();
